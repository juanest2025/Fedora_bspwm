[colors]
background = #0D0D0D
background-alt = #1A1A1A
foreground = #FFFFFF
# --- AQUÍ ESTÁ TU CAMBIO DE COLOR ---
# Turquesa Cibernético
primary = #00BCD4 
secondary = #8ABEB7
alert = #cb0e0eff
disabled = #707880

[bar/example]
width = 100%:-24
offset-x = 12
offset-y = 1%
height = 35pt
radius = 10

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-top-size = 0
border-bottom-size = 0
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator =
separator-foreground = ${colors.disabled}

# Fuente Principal (Texto general)
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=13;2"
# Fuente Secundaria (Iconos Grandes para Workspaces)
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=20;4"

# --- ORDEN DE LOS MÓDULOS ---
modules-left = bspwm
modules-center = ${env:POLYBAR_MODULES_CENTER}
# Aquí agregamos Wifi, Audio, Bluetooth y Apagado
modules-right = ${env:POLYBAR_MODULES_RIGHT}

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = bspwm

[module/bspwm]
type = custom/script
exec = ~/.config/polybar/scripts/bspwm-dynamic.py
tail = true
interval = 0
format = <label>
label = %output%


[module/pulseaudio]
type = custom/script
exec = ~/.config/polybar/scripts/volume-dynamic.py
tail = true
click-left = ~/.config/polybar/scripts/volume-slider.sh
click-right = env GTK_THEME="Arc-Dark" pavucontrol
scroll-up = ~/.config/polybar/scripts/volume.sh up
scroll-down = ~/.config/polybar/scripts/volume.sh down

[module/mic]
type = custom/script
exec = ~/.config/polybar/scripts/mic-status.py
tail = true
click-left = ~/.config/polybar/scripts/mic-slider.sh
click-right = ~/.config/polybar/scripts/mic-apps.sh
scroll-up = ~/.config/polybar/scripts/mic-volume.sh up
scroll-down = ~/.config/polybar/scripts/mic-volume.sh down

[module/brightness]
type = custom/script
exec = ~/.config/polybar/scripts/brightness-dynamic.py
tail = true
click-left = ~/.config/polybar/scripts/brightness-slider.sh
scroll-up = ~/.config/polybar/scripts/brightness.sh up
scroll-down = ~/.config/polybar/scripts/brightness.sh down

[module/wlan]
type = custom/script
exec = ~/.config/polybar/scripts/wifi-status.sh
interval = 5
format-foreground = ${colors.primary}
# CLIC IZQUIERDO: Abre script de rofi para wifi
click-left = ~/.config/polybar/scripts/rofi-wifi.py &
# CLIC DERECHO: Abre el administrador de conexiones de red en terminal
click-right = kitty -e nmtui &

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth-status.py
exec-if = command -v bluetoothctl
interval = 10
format-foreground = ${colors.primary}
# CLIC IZQUIERDO: Abre el menú Rofi (Estilo Popup)
click-left = ~/.config/polybar/scripts/rofi-bluetooth.sh
# CLIC DERECHO: Abre el administrador gráfico (Blueman)
click-right = blueman-manager &

[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/date-dynamic.py
interval = 1
click-left = ~/.config/polybar/scripts/date-dynamic.py toggle
click-right = ~/.config/polybar/scripts/rofi-date.py
label-foreground = ${colors.foreground}

[module/camera]
type = custom/script
exec = ~/.config/polybar/scripts/camera-status.sh
tail = true
click-left = ~/.config/rofi/scripts/config-menu.py camera
click-right = ~/.config/rofi/scripts/config-menu.py camera

[module/powermenu]
type = custom/text
content = " " 
content-foreground = ${colors.primary}
# CLIC: Ejecuta nuestro script de Rofi
click-left = ~/.config/rofi/powermenu.sh

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/system-monitor.py cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
click-left = kitty -e btop
label = %output%

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/system-monitor.py ram
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
click-left = kitty -e btop
label = %output%

[module/nvidia]
type = custom/script
exec = ~/.config/polybar/scripts/system-monitor.py gpu
exec-if = command -v nvidia-smi
interval = 2
format-prefix = "󰢮 "
format-prefix-foreground = ${colors.primary}
click-left = kitty -e btop
label = %output%
 
 [module/npu]
 type = custom/script
 exec = ~/.config/polybar/scripts/system-monitor.py npu
 exec-if = test -d /sys/class/accel/accel0 || lspci -n | grep -iqE "1022:1502|1022:17f0"
 interval = 2
 format-prefix = "󱚟 "
 format-prefix-foreground = ${colors.primary}
 click-left = kitty -e btop
 label = %output%

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery-dynamic.py
exec-if = test -d /sys/class/power_supply && ls /sys/class/power_supply | grep -qi "BAT"
tail = true
click-left = ~/.config/polybar/scripts/rofi-battery-mode.py

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/temperature]
type = custom/ipc
hook-0 = ~/.config/polybar/scripts/temperature-dynamic.py
initial = 1
click-left = ~/.config/polybar/scripts/temperature-dynamic.py toggle && polybar-msg action temperature hook 0
click-right = ~/.config/polybar/scripts/rofi-temperature.py

[module/browser-control]
type = custom/script
exec = ~/.config/polybar/scripts/browser-control.sh
tail = true
