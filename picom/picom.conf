# Backend GLX — Restaurado para hardware moderno (AMD Ryzen AI + NVIDIA Blackwell), ya que xrender genera ventanas transparentes y bloqueos
backend = "glx";

# Sincronización vertical activada (xrender nativo)
vsync = true;

# Opciones GLX compatibles
# Habilitado xrender-sync-fence para solucionar el congelamiento en tarjetas NVIDIA
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
xrender-sync-fence = true;
use-damage = true;             # mejora rendimiento y correctness en AMD/NVIDIA

# Sombras
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -12;
shadow-offset-y = -12;

# Transparencia
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;

# Evita que estas ventanas se vuelvan transparentes al perder el foco
focus-exclude = [
  "class_g = 'Firefox'",
  "class_g = 'firefox'",
  "class_g = 'Rofi'",
  "class_g = 'slop'",
  "class_g = 'Antigravity'"
];

# Exclusiones (para que no se ponga transparente lo que no debe)
opacity-rule = [
  "100:_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'",
  "100:class_g = 'Firefox'",
  "100:class_g = 'firefox'",
  "100:class_g = 'Rofi'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'i3lock'",
  "100:class_i = 'i3lock'",
  "85:class_g = 'Code'",
  "85:class_g = 'VSCodium'",
  "85:class_g = 'Antigravity'",
  "85:class_i = 'antigravity'",
  "85:class_g *= 'WhatsApp'",
  "85:class_g *= 'whatsapp'",
  "85:name *= 'WhatsApp'",
  "85:name *= 'whatsapp'"
];

# Animaciones nativas de picom v12+
animations = (
  {
    triggers = ["close", "hide"];
    preset = "disappear";
    duration = 0.15;
    scale = 0.9;
  },
  {
    triggers = ["open", "show"];
    preset = "appear";
    duration = 0.15;
    scale = 0.9;
  },
  {
    triggers = ["geometry"];
    preset = "geometry";
    duration = 0.15;
  }
);
